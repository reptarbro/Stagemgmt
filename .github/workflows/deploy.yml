name: Deploy to GitHub Pages

# Build the static app and publish it to GitHub Pages.
# Deploys ONLY from the default branch — the live Pages site serves one build,
# and triggering on other branches too caused runs to cancel each other via the
# shared `pages` concurrency group.
on:
  push:
    branches:
      - main
  workflow_dispatch:

# Permissions required for the GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time. Do NOT cancel an in-progress deploy — let the newer
# one queue behind it, so a nearly-finished publish is never killed.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      # Auto-enables Pages (build type = GitHub Actions) if not already on.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}
    steps:
      # First attempt. GitHub Pages occasionally returns a transient
      # "Deployment failed, try again later" — so don't fail the job on it.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 25
      # Second attempt only if the first hit the transient error. This makes the
      # deploy self-healing instead of needing a manual re-run.
      - id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
